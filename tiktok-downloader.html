<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Premium Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .gradient-text {
            background: linear-gradient(to right, #00f2ea, #ff0050);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-wrapper:focus-within {
            border-color: #00f2ea;
            box-shadow: 0 0 15px rgba(0, 242, 234, 0.3);
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff0050, #d60045);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.5);
            transform: translateY(-2px);
        }

        .loader-dots div {
            animation-timing-function: cubic-bezier(0, 1, 1, 0);
        }
        .loader-dots div:nth-child(1) { left: 8px; animation: loader-dots1 0.6s infinite; }
        .loader-dots div:nth-child(2) { left: 8px; animation: loader-dots2 0.6s infinite; }
        .loader-dots div:nth-child(3) { left: 32px; animation: loader-dots2 0.6s infinite; }
        .loader-dots div:nth-child(4) { left: 56px; animation: loader-dots3 0.6s infinite; }
        @keyframes loader-dots1 { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        @keyframes loader-dots3 { 0% { transform: scale(1); } 100% { transform: scale(0); } }
        @keyframes loader-dots2 { 0% { transform: translate(0, 0); } 100% { transform: translate(24px, 0); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="text-white p-4 flex flex-col items-center justify-center">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 w-80"></div>

    <div class="glass-panel w-full max-w-4xl rounded-3xl p-6 md:p-10 relative overflow-hidden mt-10 mb-10">
        
        <div class="absolute top-0 left-0 w-32 h-32 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 -translate-x-1/2 -translate-y-1/2"></div>
        <div class="absolute bottom-0 right-0 w-32 h-32 bg-cyan-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 translate-x-1/2 translate-y-1/2"></div>

        <div class="text-center mb-10 relative z-10">
            <h1 class="text-4xl md:text-5xl font-bold mb-3 tracking-tight">TikTok <span class="gradient-text">Downloader</span></h1>
            <p class="text-gray-400 text-sm md:text-base">Download videos without watermark in HD quality instantly.</p>
        </div>

        <div class="relative z-10 max-w-2xl mx-auto">
            <div class="input-wrapper glass-panel rounded-xl p-2 flex items-center transition-all duration-300 border border-white/10 bg-slate-800/50">
                <i class="fab fa-tiktok text-gray-400 ml-4 text-xl"></i>
                <input type="text" id="url-input" 
                    class="w-full bg-transparent border-none text-white px-4 py-3 focus:outline-none placeholder-gray-500" 
                    placeholder="Paste TikTok video link here..." autocomplete="off">
                
                <button id="paste-btn" class="hidden md:flex items-center gap-2 text-xs font-semibold bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-gray-300 transition-colors mr-2">
                    <i class="fas fa-paste"></i> PASTE
                </button>
                
                <button id="download-btn" class="btn-primary rounded-lg px-6 py-3 font-bold text-white flex items-center gap-2 whitespace-nowrap">
                    <i class="fas fa-download"></i> <span class="hidden sm:inline">GET VIDEO</span>
                </button>
            </div>
            
            <div class="text-center mt-3 md:hidden">
                <button id="paste-btn-mobile" class="text-xs text-cyan-400 hover:text-cyan-300 font-medium">
                    <i class="fas fa-clipboard mr-1"></i> Paste from clipboard
                </button>
            </div>
        </div>

        <div id="loading-indicator" class="hidden my-12 text-center">
            <div class="inline-block relative w-20 h-20">
                <div class="loader-dots relative w-full h-full">
                    <div class="absolute top-[33px] w-[13px] h-[13px] rounded-full bg-cyan-400"></div>
                    <div class="absolute top-[33px] w-[13px] h-[13px] rounded-full bg-cyan-400"></div>
                    <div class="absolute top-[33px] w-[13px] h-[13px] rounded-full bg-pink-500"></div>
                    <div class="absolute top-[33px] w-[13px] h-[13px] rounded-full bg-pink-500"></div>
                </div>
            </div>
            <p class="text-gray-400 text-sm animate-pulse">Fetching video details...</p>
        </div>

        <div id="result-section" class="hidden mt-10 border-t border-white/10 pt-10 animate-fade-in-up">
            <div id="result-content"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl w-full text-center text-gray-400 text-xs md:text-sm">
        <div class="glass-panel p-4 rounded-xl">
            <i class="fas fa-bolt text-yellow-400 text-xl mb-2"></i>
            <h3 class="font-bold text-white mb-1">Fast Download</h3>
            <p>Super fast server processing</p>
        </div>
        <div class="glass-panel p-4 rounded-xl">
            <i class="fas fa-ban text-red-400 text-xl mb-2"></i>
            <h3 class="font-bold text-white mb-1">No Watermark</h3>
            <p>Clean videos without logo</p>
        </div>
        <div class="glass-panel p-4 rounded-xl">
            <i class="fas fa-shield-alt text-green-400 text-xl mb-2"></i>
            <h3 class="font-bold text-white mb-1">Secure</h3>
            <p>No data storage, completely safe</p>
        </div>
    </div>

    <div id="download-progress" class="fixed bottom-5 right-5 glass-panel p-4 rounded-xl w-80 hidden z-50 border-l-4 border-cyan-400 shadow-2xl">
        <div class="flex justify-between items-center mb-2">
            <h4 class="text-sm font-bold text-white"><i class="fas fa-cloud-download-alt mr-2"></i>Downloading...</h4>
            <button onclick="hideDownloadProgress()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
        </div>
        <div class="text-xs text-gray-400 truncate mb-2" id="download-filename">video.mp4</div>
        <div class="w-full bg-slate-700 rounded-full h-2 overflow-hidden">
            <div id="download-progress-bar" class="bg-gradient-to-r from-cyan-400 to-blue-500 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
        <div class="text-right text-xs text-cyan-400 mt-1" id="download-percentage">0%</div>
    </div>

    <script>
        // DOM Elements
        const urlInput = document.getElementById('url-input');
        const pasteBtn = document.getElementById('paste-btn');
        const pasteBtnMobile = document.getElementById('paste-btn-mobile');
        const downloadBtn = document.getElementById('download-btn');
        const loadingIndicator = document.getElementById('loading-indicator');
        const resultSection = document.getElementById('result-section');
        const resultContent = document.getElementById('result-content');
        const toastContainer = document.getElementById('toast-container');
        const downloadProgress = document.getElementById('download-progress');
        const downloadProgressBar = document.getElementById('download-progress-bar');
        const downloadPercentage = document.getElementById('download-percentage');
        const downloadFilename = document.getElementById('download-filename');
        
        // Configuration
        const API_KEY = 'hasan_key_5HW7yVcJ9SAXqTJuDcJM';
        const API_URL = 'https://tiksaveapi.vercel.app/api/download';
        const PROXY_URL = 'https://proxydownload-api.vercel.app/api/proxy/download?url=';
        
        // Paste Function
        async function handlePaste() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    urlInput.value = text;
                    urlInput.focus();
                    showToast('Success', 'URL pasted from clipboard', 'success');
                }
            } catch (err) {
                showToast('Error', 'Clipboard access denied', 'error');
            }
        }

        pasteBtn.addEventListener('click', handlePaste);
        if(pasteBtnMobile) pasteBtnMobile.addEventListener('click', handlePaste);
        
        // Download Logic (Proxy)
        function downloadWithProxy(fileUrl, filename, label) {
            showToast('Started', `Downloading ${label}...`, 'info');
            
            downloadFilename.textContent = filename;
            downloadProgressBar.style.width = '10%';
            downloadPercentage.textContent = '10%';
            downloadProgress.classList.remove('hidden');
            
            let progress = 10;
            const progressInterval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 15;
                    if(progress > 90) progress = 90;
                    downloadProgressBar.style.width = progress + '%';
                    downloadPercentage.textContent = Math.round(progress) + '%';
                }
            }, 300);
            
            const proxyDownloadUrl = PROXY_URL + encodeURIComponent(fileUrl);
            
            // Hidden iframe method
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = proxyDownloadUrl;
            
            iframe.onload = function() {
                clearInterval(progressInterval);
                finishDownload(filename, label);
                setTimeout(() => document.body.removeChild(iframe), 60000);
            };
            
            iframe.onerror = function() {
                clearInterval(progressInterval);
                // Fallback
                const link = document.createElement('a');
                link.href = proxyDownloadUrl;
                link.download = filename;
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                finishDownload(filename, label);
            };
            
            // Set a fallback timer in case onload doesn't fire nicely on some browsers for downloads
            setTimeout(() => {
                if(progress < 100) {
                    clearInterval(progressInterval);
                    finishDownload(filename, label);
                }
            }, 5000);

            document.body.appendChild(iframe);
        }

        function finishDownload(filename, label) {
            downloadProgressBar.style.width = '100%';
            downloadPercentage.textContent = '100%';
            setTimeout(() => {
                downloadProgress.classList.add('hidden');
                showToast('Completed', `${label} saved successfully!`, 'success');
            }, 1000);
        }
        
        function hideDownloadProgress() {
            downloadProgress.classList.add('hidden');
        }
        
        // API Call
        downloadBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            
            if (!url) {
                showToast('Warning', 'Please paste a TikTok URL first', 'warning');
                urlInput.focus();
                return;
            }
            
            if (!url.includes('tiktok.com')) {
                showToast('Error', 'Invalid TikTok URL provided', 'error');
                return;
            }
            
            loadingIndicator.classList.remove('hidden');
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            resultSection.classList.add('hidden');
            
            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}&url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data);
                    showToast('Success', 'Video found successfully!', 'success');
                } else {
                    throw new Error('API request failed');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error', 'Failed to fetch video. Try again.', 'error');
            } finally {
                loadingIndicator.classList.add('hidden');
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="fas fa-download"></i> <span class="hidden sm:inline">GET VIDEO</span>';
            }
        });
        
        // Enter Key Support
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') downloadBtn.click();
        });
        
        // Display Results
        function displayResults(data) {
            const video = data.data;
            
            let html = `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div class="lg:col-span-4 space-y-4">
                        <div class="relative rounded-2xl overflow-hidden shadow-2xl border border-white/10 group">
                            <img src="${video.thumbnail}" alt="Cover" class="w-full object-cover aspect-[9/16] group-hover:scale-105 transition-transform duration-500">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                            <div class="absolute bottom-4 left-4 right-4">
                                <div class="flex items-center gap-2 mb-2">
                                    <i class="fas fa-play text-white text-xs"></i>
                                    <span class="text-xs text-gray-300 font-mono">${formatNumber(video.statistics.views)} views</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="glass-panel p-4 rounded-xl flex items-center gap-4">
                            <img src="${video.author.avatar}" class="w-12 h-12 rounded-full border-2 border-pink-500">
                            <div class="overflow-hidden">
                                <h3 class="font-bold text-white truncate flex items-center gap-1">
                                    ${video.author.name}
                                    ${video.author.verified ? '<i class="fas fa-check-circle text-blue-400 text-xs"></i>' : ''}
                                </h3>
                                <p class="text-xs text-gray-400 truncate">@${video.author.username}</p>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-8 flex flex-col h-full">
                        <div class="glass-panel p-6 rounded-2xl mb-6 flex-grow">
                            <h2 class="text-xl font-bold text-white mb-2 line-clamp-2">${video.title || 'No Title'}</h2>
                            <p class="text-sm text-gray-400 mb-6 line-clamp-3">${video.description || ''}</p>
                            
                            <div class="grid grid-cols-4 gap-2 mb-8">
                                <div class="text-center p-2 rounded-lg bg-white/5">
                                    <i class="fas fa-heart text-red-500 mb-1"></i>
                                    <div class="text-xs font-bold">${formatNumber(video.statistics.likes)}</div>
                                </div>
                                <div class="text-center p-2 rounded-lg bg-white/5">
                                    <i class="fas fa-comment text-blue-400 mb-1"></i>
                                    <div class="text-xs font-bold">${formatNumber(video.statistics.comments)}</div>
                                </div>
                                <div class="text-center p-2 rounded-lg bg-white/5">
                                    <i class="fas fa-share text-green-400 mb-1"></i>
                                    <div class="text-xs font-bold">${formatNumber(video.statistics.shares)}</div>
                                </div>
                                <div class="text-center p-2 rounded-lg bg-white/5">
                                    <i class="fas fa-music text-yellow-400 mb-1"></i>
                                    <div class="text-xs font-bold">Music</div>
                                </div>
                            </div>

                            <h3 class="text-sm font-bold text-gray-300 uppercase mb-4 tracking-wider">Download Options</h3>
                            
                            <div class="space-y-3">
                                ${video.download_links.video.map((link, i) => {
                                    const filename = `tiktok_${video.author.username}_${Date.now()}.mp4`;
                                    const isHD = link.label && link.label.toLowerCase().includes('hd');
                                    return `
                                        <button onclick="downloadWithProxy('${link.url}', '${filename}', '${link.label || 'Video'}')" 
                                            class="w-full group relative overflow-hidden rounded-xl p-4 flex items-center justify-between transition-all hover:scale-[1.01] ${isHD ? 'bg-gradient-to-r from-blue-600 to-cyan-600' : 'bg-slate-700 hover:bg-slate-600'}">
                                            <div class="flex items-center gap-4 z-10">
                                                <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">
                                                    <i class="fas fa-video text-white"></i>
                                                </div>
                                                <div class="text-left">
                                                    <div class="font-bold text-white text-sm">${link.label || `Server ${i+1}`}</div>
                                                    <div class="text-xs text-white/70">MP4 • No Watermark</div>
                                                </div>
                                            </div>
                                            <div class="z-10 bg-white/20 px-3 py-1 rounded-full text-xs font-bold text-white">
                                                DOWNLOAD
                                            </div>
                                        </button>
                                    `;
                                }).join('')}

                                ${video.download_links.audio.map(link => {
                                    const filename = `audio_${video.author.username}_${Date.now()}.mp3`;
                                    return `
                                        <button onclick="downloadWithProxy('${link.url}', '${filename}', 'Audio')" 
                                            class="w-full group relative overflow-hidden rounded-xl p-4 flex items-center justify-between bg-slate-800 border border-slate-600 hover:bg-slate-700 transition-all hover:scale-[1.01] mt-2">
                                            <div class="flex items-center gap-4 z-10">
                                                <div class="w-10 h-10 rounded-full bg-orange-500/20 flex items-center justify-center">
                                                    <i class="fas fa-music text-orange-400"></i>
                                                </div>
                                                <div class="text-left">
                                                    <div class="font-bold text-gray-200 text-sm">Download Audio</div>
                                                    <div class="text-xs text-gray-400">MP3 • High Quality</div>
                                                </div>
                                            </div>
                                            <div class="z-10 text-orange-400 px-3 py-1 text-xl">
                                                <i class="fas fa-download"></i>
                                            </div>
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            resultContent.innerHTML = html;
            resultSection.classList.remove('hidden');
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Helper: Format Numbers
        function formatNumber(numStr) {
            if(!numStr) return '0';
            // If API returns string like "1.2M" return as is, else format raw numbers
            if(isNaN(numStr)) return numStr;
            const num = parseInt(numStr);
            if(num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if(num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num;
        }

        // Toast Notification System
        function showToast(title, message, type = 'info') {
            const toast = document.createElement('div');
            const colors = {
                success: 'border-l-4 border-green-500 bg-slate-800',
                error: 'border-l-4 border-red-500 bg-slate-800',
                warning: 'border-l-4 border-yellow-500 bg-slate-800',
                info: 'border-l-4 border-blue-500 bg-slate-800'
            };
            
            const icons = {
                success: '<i class="fas fa-check-circle text-green-500"></i>',
                error: '<i class="fas fa-exclamation-circle text-red-500"></i>',
                warning: '<i class="fas fa-exclamation-triangle text-yellow-500"></i>',
                info: '<i class="fas fa-info-circle text-blue-500"></i>'
            };

            toast.className = `${colors[type]} p-4 rounded shadow-2xl flex items-start gap-3 transform transition-all duration-300 translate-x-full opacity-0`;
            toast.innerHTML = `
                <div class="mt-0.5 text-lg">${icons[type]}</div>
                <div>
                    <h4 class="font-bold text-sm text-gray-200">${title}</h4>
                    <p class="text-xs text-gray-400 mt-1">${message}</p>
                </div>
            `;

            toastContainer.appendChild(toast);
            
            // Animation In
            requestAnimationFrame(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
            });

            // Remove after 3s
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>

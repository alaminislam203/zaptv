<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toffee TikTok Downloader</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>(function(s){s.dataset.zone='10282293',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0b0c15;
            --card-bg: #151621;
            --text: #e2e8f0;
            --red: #ef4444;
            --green: #2ecc71;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.05), transparent 60%);
            min-height: 100vh;
        }

        /* Branding Fonts */
        .font-oswald { font-family: 'Oswald', sans-serif; }
        
        /* Custom Card Style to match TV App */
        .app-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .gradient-text {
            background: linear-gradient(90deg, var(--primary), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Input Styling */
        .custom-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .custom-input:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
        }

        /* Button Styling */
        .btn-primary {
            background: var(--primary);
            color: #000;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            border-color: var(--primary);
            color: white;
        }

        /* Loader Animation */
        .loader-dots div { animation-timing-function: cubic-bezier(0, 1, 1, 0); }
        .loader-dots div:nth-child(1) { left: 8px; animation: loader-dots1 0.6s infinite; }
        .loader-dots div:nth-child(2) { left: 8px; animation: loader-dots2 0.6s infinite; }
        .loader-dots div:nth-child(3) { left: 32px; animation: loader-dots2 0.6s infinite; }
        .loader-dots div:nth-child(4) { left: 56px; animation: loader-dots3 0.6s infinite; }
        @keyframes loader-dots1 { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        @keyframes loader-dots3 { 0% { transform: scale(1); } 100% { transform: scale(0); } }
        @keyframes loader-dots2 { 0% { transform: translate(0, 0); } 100% { transform: translate(24px, 0); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body class="flex flex-col items-center justify-start pt-10 px-4">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 w-80"></div>

    <div class="w-full max-w-3xl">
        
        <div class="text-center mb-8">
            <div class="font-oswald text-3xl md:text-4xl uppercase tracking-wide mb-2">
                <i class="fab fa-tiktok text-cyan-400 mr-2"></i> Toffee<span class="gradient-text">Downloader</span>
            </div>
            <p class="text-gray-400 text-sm">Download TikTok videos without watermark instantly.</p>
        </div>

        <div class="app-card rounded-2xl p-6 md:p-8 relative overflow-hidden mb-8">
            <div class="relative z-10">
                <div class="custom-input rounded-xl p-2 flex items-center transition-all duration-300">
                    <i class="fas fa-link text-gray-400 ml-4 text-lg"></i>
                    <input type="text" id="url-input" 
                        class="w-full bg-transparent border-none text-white px-4 py-3 focus:outline-none placeholder-gray-500 text-sm" 
                        placeholder="Paste video link here..." autocomplete="off">
                    
                    <button id="paste-btn" class="hidden md:flex items-center gap-2 text-xs font-bold btn-secondary px-4 py-2 rounded-lg transition-colors mr-2">
                        PASTE
                    </button>
                    
                    <button id="download-btn" class="btn-primary rounded-lg px-6 py-3 text-sm flex items-center gap-2 whitespace-nowrap">
                        <i class="fas fa-download"></i> <span class="hidden sm:inline">DOWNLOAD</span>
                    </button>
                </div>
                
                <div class="text-center mt-3 md:hidden">
                    <button id="paste-btn-mobile" class="text-xs text-cyan-400 font-medium">
                        <i class="fas fa-clipboard mr-1"></i> Paste from clipboard
                    </button>
                </div>
            </div>

            <div id="loading-indicator" class="hidden mt-8 text-center">
                <div class="inline-block relative w-20 h-10">
                    <div class="loader-dots relative w-full h-full">
                        <div class="absolute top-[10px] w-[10px] h-[10px] rounded-full bg-cyan-400"></div>
                        <div class="absolute top-[10px] w-[10px] h-[10px] rounded-full bg-cyan-400"></div>
                        <div class="absolute top-[10px] w-[10px] h-[10px] rounded-full bg-white"></div>
                        <div class="absolute top-[10px] w-[10px] h-[10px] rounded-full bg-white"></div>
                    </div>
                </div>
                <p class="text-cyan-400 text-xs animate-pulse">Processing video...</p>
            </div>
        </div>

        <div id="result-section" class="hidden mb-10">
            <div id="result-content"></div>
        </div>

        <div class="grid grid-cols-3 gap-4 text-center text-xs text-gray-400">
            <div class="app-card p-4 rounded-xl">
                <i class="fas fa-bolt text-cyan-400 text-xl mb-2"></i>
                <h3 class="font-bold text-gray-200 mb-1">Fast</h3>
            </div>
            <div class="app-card p-4 rounded-xl">
                <i class="fas fa-ban text-red-400 text-xl mb-2"></i>
                <h3 class="font-bold text-gray-200 mb-1">No Logo</h3>
            </div>
            <div class="app-card p-4 rounded-xl">
                <i class="fas fa-check-circle text-green-400 text-xl mb-2"></i>
                <h3 class="font-bold text-gray-200 mb-1">HD Quality</h3>
            </div>
        </div>

        <div class="text-center mt-8 pb-8">
            <a href="index.html" class="text-xs text-gray-500 hover:text-cyan-400 transition-colors">
                <i class="fas fa-arrow-left mr-1"></i> Back to Live TV
            </a>
        </div>
    </div>

    <div id="download-progress" class="fixed bottom-5 right-5 app-card p-4 rounded-xl w-80 hidden z-50 border-l-4 border-cyan-400">
        <div class="flex justify-between items-center mb-2">
            <h4 class="text-sm font-bold text-white"><i class="fas fa-cloud-download-alt mr-2 text-cyan-400"></i>Downloading...</h4>
            <button onclick="hideDownloadProgress()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
        </div>
        <div class="text-xs text-gray-400 truncate mb-2" id="download-filename">video.mp4</div>
        <div class="w-full bg-gray-700 rounded-full h-1.5 overflow-hidden">
            <div id="download-progress-bar" class="bg-cyan-400 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
        <div class="text-right text-xs text-cyan-400 mt-1" id="download-percentage">0%</div>
    </div>

    <script>
        // DOM Elements
        const urlInput = document.getElementById('url-input');
        const pasteBtn = document.getElementById('paste-btn');
        const pasteBtnMobile = document.getElementById('paste-btn-mobile');
        const downloadBtn = document.getElementById('download-btn');
        const loadingIndicator = document.getElementById('loading-indicator');
        const resultSection = document.getElementById('result-section');
        const resultContent = document.getElementById('result-content');
        const toastContainer = document.getElementById('toast-container');
        const downloadProgress = document.getElementById('download-progress');
        const downloadProgressBar = document.getElementById('download-progress-bar');
        const downloadPercentage = document.getElementById('download-percentage');
        const downloadFilename = document.getElementById('download-filename');
        
        // Configuration
        const API_KEY = 'hasan_key_5HW7yVcJ9SAXqTJuDcJM';
        const API_URL = 'https://tiksaveapi.vercel.app/api/download';
        const PROXY_URL = 'https://proxydownload-api.vercel.app/api/proxy/download?url=';
        
        // Paste Function
        async function handlePaste() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    urlInput.value = text;
                    urlInput.focus();
                    showToast('Success', 'Link pasted successfully', 'success');
                }
            } catch (err) {
                showToast('Error', 'Allow clipboard permission', 'error');
            }
        }

        pasteBtn.addEventListener('click', handlePaste);
        if(pasteBtnMobile) pasteBtnMobile.addEventListener('click', handlePaste);
        
        // Download Logic
        function downloadWithProxy(fileUrl, filename, label) {
            showToast('Started', `Downloading ${label}...`, 'info');
            
            downloadFilename.textContent = filename;
            downloadProgressBar.style.width = '10%';
            downloadPercentage.textContent = '10%';
            downloadProgress.classList.remove('hidden');
            
            let progress = 10;
            const progressInterval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 10;
                    if(progress > 90) progress = 90;
                    downloadProgressBar.style.width = progress + '%';
                    downloadPercentage.textContent = Math.round(progress) + '%';
                }
            }, 300);
            
            const proxyDownloadUrl = PROXY_URL + encodeURIComponent(fileUrl);
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = proxyDownloadUrl;
            
            iframe.onload = function() {
                clearInterval(progressInterval);
                finishDownload(filename, label);
                setTimeout(() => document.body.removeChild(iframe), 60000);
            };
            
            iframe.onerror = function() {
                clearInterval(progressInterval);
                const link = document.createElement('a');
                link.href = proxyDownloadUrl;
                link.download = filename;
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                finishDownload(filename, label);
            };
            
            setTimeout(() => {
                if(progress < 100) {
                    clearInterval(progressInterval);
                    finishDownload(filename, label);
                }
            }, 5000);

            document.body.appendChild(iframe);
        }

        function finishDownload(filename, label) {
            downloadProgressBar.style.width = '100%';
            downloadPercentage.textContent = '100%';
            setTimeout(() => {
                downloadProgress.classList.add('hidden');
                showToast('Completed', `${label} saved successfully!`, 'success');
            }, 1000);
        }
        
        function hideDownloadProgress() {
            downloadProgress.classList.add('hidden');
        }
        
        // API Call
        downloadBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            
            if (!url) {
                showToast('Warning', 'Paste a TikTok link first', 'warning');
                urlInput.focus();
                return;
            }
            
            loadingIndicator.classList.remove('hidden');
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
            resultSection.classList.add('hidden');
            
            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}&url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data);
                    showToast('Success', 'Video found!', 'success');
                } else {
                    throw new Error('API request failed');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error', 'Failed to fetch video.', 'error');
            } finally {
                loadingIndicator.classList.add('hidden');
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="fas fa-download"></i> <span class="hidden sm:inline">DOWNLOAD</span>';
            }
        });
        
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') downloadBtn.click();
        });
        
        // Display Results
        function displayResults(data) {
            const video = data.data;
            
            let html = `
                <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                    <div class="md:col-span-4">
                        <div class="app-card rounded-xl overflow-hidden p-2">
                            <img src="${video.thumbnail}" alt="Cover" class="w-full rounded-lg object-cover aspect-[9/16]">
                        </div>
                        
                        <div class="app-card mt-4 p-3 rounded-xl flex items-center gap-3">
                            <img src="${video.author.avatar}" class="w-10 h-10 rounded-full border border-cyan-400">
                            <div class="overflow-hidden">
                                <h3 class="font-bold text-gray-200 text-sm truncate">
                                    ${video.author.name}
                                </h3>
                                <p class="text-xs text-gray-400 truncate">@${video.author.username}</p>
                            </div>
                        </div>
                    </div>

                    <div class="md:col-span-8">
                        <div class="app-card p-5 rounded-xl h-full flex flex-col">
                            <h2 class="text-lg font-bold text-white mb-2 line-clamp-2">${video.title || 'TikTok Video'}</h2>
                            
                            <div class="flex gap-4 mb-6 border-b border-white/5 pb-4">
                                <div class="text-center">
                                    <div class="text-xs text-gray-400">Likes</div>
                                    <div class="text-sm font-bold text-white">${formatNumber(video.statistics.likes)}</div>
                                </div>
                                <div class="text-center">
                                    <div class="text-xs text-gray-400">Views</div>
                                    <div class="text-sm font-bold text-white">${formatNumber(video.statistics.views)}</div>
                                </div>
                                <div class="text-center">
                                    <div class="text-xs text-gray-400">Shares</div>
                                    <div class="text-sm font-bold text-white">${formatNumber(video.statistics.shares)}</div>
                                </div>
                            </div>

                            <div class="space-y-3 mt-auto">
                                ${video.download_links.video.map((link, i) => {
                                    const filename = `tiktok_${video.author.username}_${Date.now()}.mp4`;
                                    const isHD = link.label && link.label.toLowerCase().includes('hd');
                                    return `
                                        <button onclick="downloadWithProxy('${link.url}', '${filename}', '${link.label || 'Video'}')" 
                                            class="w-full relative overflow-hidden rounded-lg p-3 flex items-center justify-between transition-all hover:scale-[1.01] ${isHD ? 'bg-cyan-600 hover:bg-cyan-500 text-white' : 'btn-secondary'}">
                                            <div class="flex items-center gap-3 z-10">
                                                <i class="fas fa-video ${isHD ? 'text-white' : 'text-cyan-400'}"></i>
                                                <div class="text-left">
                                                    <div class="font-bold text-sm">${link.label || `Server ${i+1}`}</div>
                                                    <div class="text-[10px] opacity-70">MP4 • No Watermark</div>
                                                </div>
                                            </div>
                                            <i class="fas fa-download"></i>
                                        </button>
                                    `;
                                }).join('')}

                                ${video.download_links.audio.map(link => {
                                    const filename = `audio_${video.author.username}_${Date.now()}.mp3`;
                                    return `
                                        <button onclick="downloadWithProxy('${link.url}', '${filename}', 'Audio')" 
                                            class="w-full relative overflow-hidden rounded-lg p-3 flex items-center justify-between btn-secondary mt-2">
                                            <div class="flex items-center gap-3 z-10">
                                                <i class="fas fa-music text-pink-400"></i>
                                                <div class="text-left">
                                                    <div class="font-bold text-sm text-gray-300">Download Audio</div>
                                                    <div class="text-[10px] text-gray-500">MP3 Only</div>
                                                </div>
                                            </div>
                                            <i class="fas fa-download text-gray-400"></i>
                                        </button>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            resultContent.innerHTML = html;
            resultSection.classList.remove('hidden');
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function formatNumber(numStr) {
            if(!numStr) return '0';
            if(isNaN(numStr)) return numStr;
            const num = parseInt(numStr);
            if(num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if(num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num;
        }

        function showToast(title, message, type = 'info') {
            const toast = document.createElement('div');
            const colors = {
                success: 'border-l-4 border-green-500 bg-[#1a1c29]',
                error: 'border-l-4 border-red-500 bg-[#1a1c29]',
                warning: 'border-l-4 border-yellow-500 bg-[#1a1c29]',
                info: 'border-l-4 border-cyan-500 bg-[#1a1c29]'
            };
            
            toast.className = `${colors[type]} p-4 rounded shadow-2xl flex items-start gap-3 transform transition-all duration-300 translate-x-full opacity-0 text-white`;
            toast.innerHTML = `
                <div>
                    <h4 class="font-bold text-sm text-gray-200">${title}</h4>
                    <p class="text-xs text-gray-400 mt-1">${message}</p>
                </div>
            `;

            toastContainer.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-x-full', 'opacity-0'));
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>

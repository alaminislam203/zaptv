(function() {
    const warningText = "আপনার ব্রাউজারে অ্যাড ব্লকার চালু আছে! আমাদের সাইটটি ফ্রি রাখতে অনুগ্রহ করে এটি বন্ধ করুন।";
    const modalID = 'ab-warning-modal';
    function showModal() {
        if (document.getElementById(modalID)) return;
        const modal = document.createElement('div');
        modal.id = modalID;
        modal.style.cssText = `position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999999; display: flex; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(5px);`;
        modal.innerHTML = `<div style="background:#1a1a1a; color:#fff; padding:30px; border-radius:12px; text-align:center; max-width:90%; width:400px; border: 1px solid #333; box-shadow: 0 0 25px rgba(255,0,0,0.2);"><div style="font-size: 50px; margin-bottom: 10px;">🛡️</div><h2 style="color:#ef4444; margin:0 0 10px 0; font-family: sans-serif;">Adblock Detected</h2><p style="font-size:15px; color:#cbd5e1; line-height: 1.5; margin-bottom: 20px;">${warningText}</p><button onclick="location.reload()" style="background:#ef4444; color:white; border:none; padding:12px 25px; border-radius:6px; font-weight:bold; cursor:pointer; font-size:14px; transition: 0.2s;">রিফ্রেশ করুন</button></div>`;
        document.body.appendChild(modal);
        document.body.style.overflow = 'hidden';
    }
    async function detectAdBlock() {
        let adBlockEnabled = false;
        try { await fetch(new Request("https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js", { method: 'HEAD', mode: 'no-cors' })); } catch (e) { adBlockEnabled = true; }
        if (!adBlockEnabled) {
            const bait = document.createElement('div');
            bait.innerHTML = '&nbsp;';
            bait.className = 'adsbox ad-banner adsbygoogle pub_300x250';
            bait.style.cssText = 'position:absolute; top:-1000px; left:-1000px; width:1px; height:1px;';
            document.body.appendChild(bait);
            await new Promise(r => setTimeout(r, 100));
            if (window.document.body.getAttribute('abp') !== null || bait.offsetParent === null || bait.offsetHeight === 0 || bait.offsetLeft === 0 || window.getComputedStyle(bait).getPropertyValue('display') === 'none' || window.getComputedStyle(bait).getPropertyValue('visibility') === 'hidden') { adBlockEnabled = true; }
            try { bait.remove(); } catch(e){}
        }
        if (adBlockEnabled) { showModal(); }
    }
    window.addEventListener('load', () => { setTimeout(detectAdBlock, 1000); });
})();
</script>

        // 2. APP LOGIC
        const video = document.getElementById('zapVideo');
        const grid = document.getElementById('zapChannelGrid');
        const title = document.getElementById('zapMainTitle');
        const status = document.getElementById('zapMainStatus');
        const mainLogo = document.getElementById('zapMainLogo');
        const sourceList = document.getElementById('zapSourceList');
        const qualitySelect = document.getElementById('zapQuality');
        
        // Players
        let shakaPlayer = null;
        let hlsPlayer = null;
        let activePlayerType = 'none'; // 'shaka', 'hls', 'native'

        // Init
        async function initApp() {
            // Init Shaka
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                shakaPlayer = new shaka.Player(video);
                shakaPlayer.addEventListener('error', onError);
            }
            
            renderHotMatches();
            renderGrid();
        }

        // Play Function - The Core Hybrid Logic
        async function playSource(src, btn, channelIdx) {
            // UI Updates
            document.querySelectorAll('.zap-source-btn').forEach(b => b.classList.remove('active-src'));
            if(btn) btn.classList.add('active-src');
            status.innerHTML = '<span style="color:#00d2ff">Connecting...</span>';
            qualitySelect.style.display = 'none'; // Hide initially

            const url = src.url;
            const isDASH = url.indexOf('.mpd') > -1;
            const isHLS = url.indexOf('.m3u8') > -1;

            try {
                // CLEANUP previous players
                if (activePlayerType === 'hls' && hlsPlayer) {
                    hlsPlayer.destroy();
                    hlsPlayer = null;
                }
                if (activePlayerType === 'shaka') {
                    await shakaPlayer.unload();
                }

                // LOGIC 1: DASH (Uses Shaka)
                if (isDASH) {
                    activePlayerType = 'shaka';
                    shakaPlayer.configure({ 
                        drm: { clearKeys: src.drm || {} },
                        streaming: { bufferingGoal: 30, rebufferingGoal: 5 }
                    });
                    
                    await shakaPlayer.load(url);
                    status.innerHTML = '<span style="color:#2ecc71; font-weight:bold;">● Playing Live (DRM)</span>';
                    setupQualityShaka();
                } 
                // LOGIC 2: HLS (Uses Hls.js for stability)
                else if (isHLS) {
                    if (Hls.isSupported()) {
                        activePlayerType = 'hls';
                        hlsPlayer = new Hls();
                        hlsPlayer.loadSource(url);
                        hlsPlayer.attachMedia(video);
                        hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                            video.play();
                            status.innerHTML = '<span style="color:#2ecc71; font-weight:bold;">● Playing Live (HLS)</span>';
                            setupQualityHls();
                        });
                        hlsPlayer.on(Hls.Events.ERROR, function(event, data) {
                            if (data.fatal) {
                                status.innerHTML = '<span style="color:#ef4444">Stream Error (HLS)</span>';
                                console.error("HLS Error:", data);
                            }
                        });
                    }
                    // Native Safari (iOS)
                    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        activePlayerType = 'native';
                        video.src = url;
                        video.play();
                        status.innerHTML = '<span style="color:#2ecc71; font-weight:bold;">● Playing Live (Native)</span>';
                    } else {
                        status.innerHTML = '<span style="color:#ef4444">Format Not Supported</span>';
                    }
                }
            } catch (e) {
                console.error("Playback Error:", e);
                status.innerHTML = '<span style="color:#ef4444">Connection Failed</span>';
            }
        }

        // Quality: SHAKA
        function setupQualityShaka() {
            if (!shakaPlayer) return;
            const tracks = shakaPlayer.getVariantTracks();
            if (tracks.length === 0) return;

            qualitySelect.innerHTML = '';
            qualitySelect.style.display = 'block';

            let autoOpt = document.createElement('option');
            autoOpt.value = -1;
            autoOpt.text = 'Auto';
            qualitySelect.appendChild(autoOpt);

            const seen = new Set();
            tracks.sort((a, b) => b.height - a.height).forEach(track => {
                if (!seen.has(track.height) && track.height) {
                    seen.add(track.height);
                    let opt = document.createElement('option');
                    opt.value = track.id;
                    opt.text = `${track.height}p`;
                    qualitySelect.appendChild(opt);
                }
            });

            qualitySelect.onchange = (e) => {
                if (e.target.value == -1) {
                    shakaPlayer.configure({ abr: { enabled: true } });
                } else {
                    shakaPlayer.configure({ abr: { enabled: false } });
                    const track = tracks.find(t => t.id == e.target.value);
                    if (track) shakaPlayer.selectVariantTrack(track, true);
                }
            };
        }

        // Quality: HLS.JS
        function setupQualityHls() {
            if (!hlsPlayer || !hlsPlayer.levels || hlsPlayer.levels.length === 0) return;
            
            qualitySelect.innerHTML = '';
            qualitySelect.style.display = 'block';

            let autoOpt = document.createElement('option');
            autoOpt.value = -1;
            autoOpt.text = 'Auto';
            qualitySelect.appendChild(autoOpt);

            hlsPlayer.levels.forEach((level, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.text = level.height ? `${level.height}p` : `Level ${index}`;
                qualitySelect.appendChild(opt);
            });

            qualitySelect.onchange = (e) => {
                hlsPlayer.currentLevel = parseInt(e.target.value);
            };
        }

        function onError(error) { console.error('Shaka Error', error); }

        // --- Standard UI Rendering (Same as before) ---
        function renderHotMatches() {
            const container = document.getElementById('zapHotMatches');
            if(!container) return;
            container.innerHTML = "";
            hotMatches.forEach(match => {
                const div = document.createElement('div');
                div.className = 'zap-match-card';
                div.innerHTML = `<span class="zap-match-time">${match.time}</span><div class="zap-teams">${match.team1} <br> <span style="color:#64748b">vs</span> <br> ${match.team2}</div><div class="zap-match-info">${match.info}</div>`;
                div.onclick = () => {
                    const targetChannel = channels.find(ch => ch.name === match.channelName);
                    if (targetChannel) {
                        const index = channels.indexOf(targetChannel);
                        loadChannel(targetChannel, index);
                        document.querySelector('.zap-player-box').scrollIntoView({behavior: 'smooth'});
                    } else { alert(`Channel "${match.channelName}" not found!`); }
                };
                container.appendChild(div);
            });
        }

        function renderGrid(filterText = "") {
            const grid = document.getElementById('zapChannelGrid');
            grid.innerHTML = "";
            channels.forEach((ch, idx) => {
                if (ch.name.toLowerCase().includes(filterText.toLowerCase())) {
                    const div = document.createElement('div');
                    div.className = 'zap-card';
                    div.id = `ch-${idx}`;
                    div.innerHTML = `<img src="${ch.logo}" loading="lazy" width="35" height="35" onerror="this.src='https://via.placeholder.com/35'"><span>${ch.name}</span>`;
                    div.onclick = () => loadChannel(ch, idx);
                    grid.appendChild(div);
                }
            });
        }

        function loadChannel(ch, idx) {
            document.querySelectorAll('.zap-card').forEach(c => c.classList.remove('active'));
            const activeCard = document.getElementById(`ch-${idx}`);
            if(activeCard) activeCard.classList.add('active');
            
            title.innerText = ch.name;
            mainLogo.src = ch.logo;
            status.innerHTML = '<span style="color:#00d2ff">Ready to play</span>';
            sourceList.innerHTML = "";
            
            if (ch.sources && ch.sources.length > 0) {
                ch.sources.forEach((src, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'zap-source-btn';
                    btn.innerText = src.label || `Link ${i+1}`;
                    btn.onclick = () => playSource(src, btn, idx);
                    sourceList.appendChild(btn);
                    if (i === 0) btn.click();
                });
            }
        }

        const searchInput = document.getElementById('zapSearch');
        if(searchInput) {
            searchInput.addEventListener('input', (e) => renderGrid(e.target.value));
        }

        document.addEventListener('DOMContentLoaded', initApp);
    })();
    </script>

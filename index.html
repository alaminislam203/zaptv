    <style>
        /* Basic Page Reset */
        body {
            margin: 0;
            padding: 20px;
            background-color: #0b0c15;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: sans-serif;
        }

        /* Your Provided CSS Starts Here */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@500&display=swap');

        .zap-tv-container {
            --zap-primary: #00d2ff;
            --zap-bg: #0b0c15;
            --zap-card: rgba(255, 255, 255, 0.05);
            --zap-text: #e2e8f0;
            
            font-family: 'Inter', sans-serif;
            background: var(--zap-bg);
            color: var(--zap-text);
            width: 100%;
            max-width: 800px; /* Added max-width for better desktop view */
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            box-sizing: border-box;
        }
        .zap-tv-container * { box-sizing: border-box; }

        /* HEADER */
        .zap-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
        }
        .zap-logo {
            font-family: 'Oswald', sans-serif; font-size: 20px;
            background: linear-gradient(90deg, var(--zap-primary), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .zap-live-badge {
            font-size: 10px; background: #ef4444; color: #fff; padding: 3px 8px;
            border-radius: 4px; font-weight: bold; animation: pulse 2s infinite;
        }

        /* PLAYER */
        .zap-player-box {
            position: relative; width: 100%; aspect-ratio: 16/9;
            background: #000; border-radius: 10px; overflow: hidden;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }
        video.zap-video { width: 100%; height: 100%; object-fit: contain; }

        /* CONTROLS */
        .zap-overlay { position: absolute; top: 10px; right: 10px; z-index: 5; }
        .zap-quality-select {
            background: rgba(0,0,0,0.8); color: #fff; border: 1px solid rgba(255,255,255,0.3);
            padding: 4px; font-size: 11px; border-radius: 4px; cursor: pointer;
        }

        /* INFO AREA */
        .zap-info-container {
            background: var(--zap-card); padding: 12px; border-radius: 8px; margin-bottom: 20px;
        }
        .zap-info-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .zap-channel-logo {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--zap-primary);
            padding: 2px; background: rgba(0,0,0,0.3);
        }
        .zap-info-text h3 { margin: 0; font-size: 16px; color: #fff; }
        .zap-info-text p { margin: 2px 0 0; font-size: 11px; color: #a0aec0; }

        /* SOURCE BUTTONS */
        .zap-sources { display: flex; gap: 8px; flex-wrap: wrap; }
        .zap-source-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            color: #ccc; padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
        }
        .zap-source-btn.active-src {
            background: var(--zap-primary); color: #000; font-weight: bold;
        }

        /* GRID */
        .zap-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 10px; max-height: 300px; overflow-y: auto;
        }
        .zap-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px; padding: 10px; text-align: center; cursor: pointer;
            transition: 0.2s;
        }
        .zap-card:hover, .zap-card.active {
            background: rgba(255,255,255,0.1); border-color: var(--zap-primary);
        }
        .zap-card.active { box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        .zap-card img { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; }
        .zap-card span { display: block; font-size: 10px; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>

        const video = document.getElementById('zapVideo');
        const grid = document.getElementById('zapChannelGrid');
        const title = document.getElementById('zapMainTitle');
        const status = document.getElementById('zapMainStatus');
        const mainLogo = document.getElementById('zapMainLogo');
        const sourceList = document.getElementById('zapSourceList');
        const qualitySelect = document.getElementById('zapQuality');
        
        let player = null;

        // 1. Initialize Shaka Player
        async function initApp() {
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                player = new shaka.Player(video);
                player.addEventListener('error', onError);
                renderGrid();
            } else {
                console.error('Browser not supported!');
            }
        }

        function renderGrid() {
            grid.innerHTML = "";
            channels.forEach((ch, idx) => {
                const div = document.createElement('div');
                div.className = 'zap-card';
                div.id = `ch-${idx}`;
                div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;
                div.onclick = () => loadChannel(ch, idx);
                grid.appendChild(div);
            });
        }

        function loadChannel(ch, idx) {
            document.querySelectorAll('.zap-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`ch-${idx}`).classList.add('active');
            
            title.innerText = ch.name;
            mainLogo.src = ch.logo;
            status.innerHTML = '<span style="color:#00d2ff">Connecting...</span>';
            
            sourceList.innerHTML = "";
            
            if (ch.sources.length > 0) {
                ch.sources.forEach((src, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'zap-source-btn';
                    btn.innerText = src.label;
                    btn.onclick = () => playSource(src, btn);
                    sourceList.appendChild(btn);
                    if (i === 0) btn.click();
                });
            }
        }

        async function playSource(src, btn) {
            document.querySelectorAll('.zap-source-btn').forEach(b => b.classList.remove('active-src'));
            if(btn) btn.classList.add('active-src');

            try {
                // Configure DRM if keys exist
                if (src.drm) {
                    player.configure({
                        drm: {
                            clearKeys: src.drm
                        }
                    });
                } else {
                    player.configure({ drm: {} }); // Reset DRM
                }

                await player.load(src.url);
                status.innerHTML = '<span style="color:#2ecc71">● Playing Live</span>';
                setupQuality();
            } catch (e) {
                onError(e);
            }
        }

        function setupQuality() {
            const tracks = player.getVariantTracks();
            qualitySelect.innerHTML = '<option value="-1">Auto</option>';
            
            if (tracks.length > 0) {
                qualitySelect.style.display = 'block';
                // Filter unique heights to avoid duplicates
                const seen = new Set();
                tracks.sort((a, b) => b.height - a.height).forEach(track => {
                    if (!seen.has(track.height) && track.height) {
                        seen.add(track.height);
                        let opt = document.createElement('option');
                        opt.value = track.id;
                        opt.text = `${track.height}p`;
                        qualitySelect.appendChild(opt);
                    }
                });
                
                qualitySelect.onchange = (e) => {
                    if (e.target.value == -1) {
                        player.configure({ abr: { enabled: true } });
                    } else {
                        player.configure({ abr: { enabled: false } });
                        const track = tracks.find(t => t.id == e.target.value);
                        if (track) player.selectVariantTrack(track, true);
                    }
                };
            } else {
                qualitySelect.style.display = 'none';
            }
        }

        function onError(error) {
            console.error('Error code', error.code, 'object', error);
            status.innerHTML = '<span style="color:#ef4444">Stream Error / Offline</span>';
        }

        document.addEventListener('DOMContentLoaded', initApp);
    })();
    </script>
</body>
</html>

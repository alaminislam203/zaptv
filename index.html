<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0c15">
<meta name="description" content="ToffeeTvLive - Premium Live TV Streaming">
<title>Toffee Tv Live Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --primary: #00d2ff;
        --bg: #0b0c15;
        --card-bg: #151621;
        --text: #e2e8f0;
        --red: #ef4444;
        --green: #2ecc71;
    }

    body { margin: 0; padding: 10px; background-color: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); -webkit-tap-highlight-color: transparent; }
    
    .app-container { max-width: 900px; margin: 0 auto; padding-bottom: 20px; }

    /* HEADER */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .logo { font-family: 'Oswald', sans-serif; font-size: 22px; background: linear-gradient(90deg, var(--primary), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .live-badge { font-size: 10px; background: var(--red); color: #fff; padding: 4px 8px; border-radius: 4px; font-weight: bold; animation: pulse 1.5s infinite; }

    /* PLAYER AREA */
    .player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0, 210, 255, 0.15); margin-bottom: 10px; }
    video { width: 100%; height: 100%; object-fit: contain; }
    iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
    
    /* Controls */
    .player-controls { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
    .ctrl-btn { flex: 1; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px; border-radius: 6px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; white-space: nowrap; }
    .ctrl-btn:active { transform: scale(0.95); }

    /* INFO CARD */
    .info-card { background: var(--card-bg); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
    .info-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .ch-logo-lg { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; object-fit: contain; background: #000; }
    .status-text { font-size: 10px; color: var(--green); margin-top: 2px; }
    
    .source-list { display: flex; gap: 6px; flex-wrap: wrap; }
    .src-btn { background: rgba(255,255,255,0.08); border: none; color: #ccc; padding: 5px 10px; border-radius: 15px; font-size: 10px; cursor: pointer; }
    .src-btn.active { background: var(--primary); color: #000; font-weight: bold; }

    /* HOT MATCHES */
    .hot-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 15px; scrollbar-width: none; }
    .match-card { min-width: 140px; background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.5)); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; cursor: pointer; position: relative; }
    .match-time { position: absolute; top: 5px; right: 5px; font-size: 9px; font-weight: bold; background: rgba(0,0,0,0.6); color: #fff; padding: 2px 5px; border-radius: 4px; transition: 0.3s; }
    .match-time.is-live { background: #ef4444; animation: pulse 1s infinite; }
    .match-teams { font-size: 11px; font-weight: bold; margin-top: 20px; line-height: 1.4; }

    /* SEARCH */
    .search-box { width: 100%; padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; margin-bottom: 10px; outline: none; font-size: 14px; }
    .search-box:focus { border-color: var(--primary); }

    /* --- SCROLLABLE CHANNEL BOX (Performance Optimized) --- */
    .grid-container {
        /* নির্দিষ্ট হাইট দেওয়া হলো যাতে স্ক্রল হয় */
        max-height: 450px; 
        overflow-y: auto; 
        background: rgba(0,0,0,0.2);
        border-radius: 10px;
        padding: 5px;
        border: 1px solid rgba(255,255,255,0.05);
        /* স্মুথ স্ক্রলিং এর জন্য */
        -webkit-overflow-scrolling: touch; 
    }
    
    /* কাস্টম স্ক্রলবার */
    .grid-container::-webkit-scrollbar { width: 5px; }
    .grid-container::-webkit-scrollbar-track { background: transparent; }
    .grid-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    .grid-container::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
    
    .card { 
        background: var(--card-bg); border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; position: relative; border: 1px solid rgba(255,255,255,0.05); 
        /* লেআউট শিফট আটকানোর জন্য */
        content-visibility: auto; 
        contain-intrinsic-size: 80px;
    }
    .card:hover { border-color: var(--primary); }
    .card.active { border-color: var(--primary); background: rgba(0, 210, 255, 0.05); }
    
    .card img { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; }
    .card-title { font-size: 10px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .fav-icon { position: absolute; top: 5px; right: 5px; font-size: 12px; color: rgba(255,255,255,0.2); z-index: 2; }
    .fav-icon.is-fav { color: var(--red); }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 11px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; bottom: 40px; }
</style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo"><i class="fas fa-play-circle"></i> ToffeePro</div>
        <div class="live-badge">● LIVE</div>
    </div>

    <div class="player-wrapper">
        <video id="videoPlayer" controls autoplay playsinline poster="https://i.imgur.com/3Yp7XlS.png"></video>
        <iframe id="iframePlayer" style="display:none;" allowfullscreen allow="encrypted-media; autoplay"></iframe>
    </div>

    <div class="player-controls">
        <button class="ctrl-btn" onclick="togglePiP()"><i class="fas fa-compress-arrows-alt"></i> PiP</button>
        <button class="ctrl-btn" onclick="toggleAspect()"><i class="fas fa-expand"></i> Zoom</button>
        <button class="ctrl-btn" onclick="toggleFavoriteCurrent()"><i class="fas fa-heart"></i> Fav</button>
        <button class="ctrl-btn" onclick="reportIssue()" style="border-color: var(--red); color: var(--red);"><i class="fas fa-exclamation-triangle"></i> Report</button>
    </div>

    <div class="info-card">
        <div class="info-header">
            <img id="mainLogo" class="ch-logo-lg" src="https://via.placeholder.com/50">
            <div>
                <h3 id="mainTitle" style="margin:0; font-size:15px;">Select a Channel</h3>
                <div id="mainStatus" class="status-text">Ready to watch</div>
            </div>
        </div>
        <div id="sourceContainer" class="source-list"></div>
    </div>

    <div style="margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #fff;">🔥 HOT MATCHES</div>
    <div id="hotMatchesContainer" class="hot-scroll"></div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 চ্যানেল খুঁজুন...">

    <div class="grid-container">
        <div id="channelGrid" class="grid"></div>
    </div>

    <div id="toast" class="toast">Action Successful</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mux.js/6.3.0/mux.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.compiled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

<script>
    // ================= DATA =================
    const hotMatches = [
        { 
            team1: "Bangladesh", team2: "India", 
            info: "1st ODI", 
            matchTime: "2025-12-09T20:00:00", 
            channelName: "T Sports HD" 
        },
        { 
            team1: "Real Madrid", team2: "Barca", 
            info: "La Liga", 
            matchTime: "2025-12-10T02:00:00", 
            channelName: "Sony Ten 1" 
        }
    ];

    const channels = [
        {
            name: "T Sports HD",
            logo: "https://i.ibb.co/Dr3R4jc/tsports.png",
            sources: [
                { label: "Server 1", url: "https://live-cdn.tsports.com/live-01/master.m3u8" } 
            ]
        },
        {
            name: "Ten Cricket",
            logo: "https://i.postimg.cc/fWV00yP8/20250529_123315.png",
            sources: [
                { label: "Server 1", url: "https://bongoflixbd.top/?watch=212f6ccc690a978b72b758522a82d9b4", isEmbed: true }
            ]
        },
        {
            name: "Sony Ten 1",
            logo: "https://upload.wikimedia.org/wikipedia/commons/9/93/Sony_Sports_Ten_1_logo.png",
            sources: [
                { label: "HD Link", url: "https://example.com/stream.m3u8" }
            ]
        },
        {
            name: "Somoy TV",
            logo: "https://upload.wikimedia.org/wikipedia/en/c/c2/Somoy_TV_Logo.jpg",
            sources: [
                { label: "YouTube", url: "https://www.youtube.com/embed/P6p72v5Vz_k?autoplay=1", isEmbed: true }
            ]
        }
    ];

    // ================= STATE =================
    let favorites = JSON.parse(localStorage.getItem('zapFavorites')) || [];
    let activePlayer = null; 
    let shakaInstance = null;
    let hlsInstance = null;
    let currentChannelIdx = -1;
    let timerInterval = null;

    // ================= DOM =================
    const video = document.getElementById('videoPlayer');
    const iframe = document.getElementById('iframePlayer');
    const grid = document.getElementById('channelGrid');
    const search = document.getElementById('searchInput');
    const title = document.getElementById('mainTitle');
    const logo = document.getElementById('mainLogo');
    const status = document.getElementById('mainStatus');
    const srcContainer = document.getElementById('sourceContainer');
    const hotMatchContainer = document.getElementById('hotMatchesContainer');

    // ================= INIT =================
    function init() {
        shaka.polyfill.installAll();
        if(shaka.Player.isBrowserSupported()) {
            shakaInstance = new shaka.Player(video);
        }
        renderHotMatches();
        renderChannels(); // Initial render
        startCountdown();
        
        // Debounce Search for Performance
        let timeout = null;
        search.addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                renderChannels(e.target.value);
            }, 300); // 300ms delay to stop lag
        });
    }

    // ================= LOGIC =================
    
    function startCountdown() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const timeBadges = document.querySelectorAll('.match-time');
            const now = new Date().getTime();
            timeBadges.forEach(badge => {
                const targetTime = new Date(badge.dataset.time).getTime();
                const diff = targetTime - now;
                if (diff > 0) {
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    badge.innerText = `${hours}h ${minutes}m ${seconds}s`;
                    badge.classList.remove('is-live');
                } else {
                    badge.innerText = "LIVE";
                    badge.classList.add('is-live');
                }
            });
        }, 1000);
    }

    function renderHotMatches() {
        hotMatchContainer.innerHTML = "";
        // Use Fragment for Speed
        const fragment = document.createDocumentFragment();
        hotMatches.forEach(match => {
            const div = document.createElement('div');
            div.className = 'match-card';
            div.innerHTML = `
                <div class="match-time" data-time="${match.matchTime}">...</div>
                <div class="match-teams">${match.team1} <br> <span style="color:#999;font-weight:normal">vs</span> <br> ${match.team2}</div>
                <div style="font-size:10px; color:#aaa; margin-top:5px;">${match.info}</div>
            `;
            div.onclick = () => {
                const targetIdx = channels.findIndex(ch => ch.name === match.channelName);
                if(targetIdx !== -1) loadChannel(targetIdx);
                else showToast("Channel not found!");
            };
            fragment.appendChild(div);
        });
        hotMatchContainer.appendChild(fragment);
    }

    function renderChannels(query = "") {
        grid.innerHTML = "";
        const filtered = channels.filter(ch => ch.name.toLowerCase().includes(query.toLowerCase()));
        
        if(filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:20px;color:#666;">No channels found</div>`;
            return;
        }

        // PERFORMANCE OPTIMIZATION: DocumentFragment
        const fragment = document.createDocumentFragment();
        
        filtered.forEach(ch => {
            const originalIdx = channels.indexOf(ch);
            const isFav = favorites.includes(originalIdx);

            const div = document.createElement('div');
            div.className = `card ${currentChannelIdx === originalIdx ? 'active' : ''}`;
            div.onclick = (e) => {
                if(!e.target.classList.contains('fav-icon')) loadChannel(originalIdx);
            };

            // loading="lazy" & decoding="async" for Speed
            div.innerHTML = `
                <i class="fas fa-heart fav-icon ${isFav ? 'is-fav' : ''}" onclick="toggleFav(${originalIdx}, this)"></i>
                <img src="${ch.logo}" loading="lazy" decoding="async" onerror="this.src='https://via.placeholder.com/40'">
                <div class="card-title">${ch.name}</div>
            `;
            fragment.appendChild(div);
        });
        
        grid.appendChild(fragment);
    }

    function toggleFav(idx, iconElem) {
        if (favorites.includes(idx)) {
            favorites = favorites.filter(id => id !== idx);
            if(iconElem) iconElem.classList.remove('is-fav');
            showToast("Removed from Favorites");
        } else {
            favorites.push(idx);
            if(iconElem) iconElem.classList.add('is-fav');
            showToast("Added to Favorites ❤️");
        }
        localStorage.setItem('zapFavorites', JSON.stringify(favorites));
    }

    function toggleFavoriteCurrent() {
        if(currentChannelIdx !== -1) {
            toggleFav(currentChannelIdx, null);
            renderChannels(search.value);
        } else {
            showToast("Select a channel first");
        }
    }

    function loadChannel(idx) {
        currentChannelIdx = idx;
        const ch = channels[idx];
        title.innerText = ch.name;
        logo.src = ch.logo;
        status.innerHTML = `<span style="color:#00d2ff">Connecting...</span>`;
        srcContainer.innerHTML = "";
        renderChannels(search.value); 
        
        ch.sources.forEach((src, i) => {
            const btn = document.createElement('button');
            btn.className = `src-btn ${i===0?'active':''}`;
            btn.innerText = src.label;
            btn.onclick = () => playSource(src, btn);
            srcContainer.appendChild(btn);
            if(i === 0) playSource(src, btn);
        });
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function playSource(src, btnElem) {
        document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
        if(btnElem) btnElem.classList.add('active');
        const url = src.url;
        const isEmbed = src.isEmbed;
        const isMpd = url.includes('.mpd');
        const isHls = url.includes('.m3u8');

        if(hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if(activePlayer === 'shaka') { await shakaInstance.unload(); }
        
        if (isEmbed) {
            video.style.display = 'none';
            video.pause();
            iframe.style.display = 'block';
            iframe.src = url;
            status.innerHTML = `<span style="color:orange">Playing Embed</span>`;
        } else {
            iframe.style.display = 'none';
            iframe.src = "";
            video.style.display = 'block';
            try {
                if (isMpd) {
                    activePlayer = 'shaka';
                    shakaInstance.configure({ drm: { clearKeys: src.drm || {} } });
                    await shakaInstance.load(url);
                    status.innerHTML = `<span style="color:#2ecc71">Playing Live (DRM)</span>`;
                } else if (isHls) {
                    if(Hls.isSupported()) {
                        const config = {};
                        if(src.headers) {
                             config.xhrSetup = (xhr) => { for(let key in src.headers) xhr.setRequestHeader(key, src.headers[key]); }
                        }
                        hlsInstance = new Hls(config);
                        hlsInstance.loadSource(url);
                        hlsInstance.attachMedia(video);
                        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                            video.play();
                            status.innerHTML = `<span style="color:#2ecc71">Playing Live (HLS)</span>`;
                        });
                        hlsInstance.on(Hls.Events.ERROR, (e, data) => { if(data.fatal) status.innerHTML = `<span style="color:red">Stream Error</span>`; });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                        video.play();
                    }
                } else {
                    video.src = url;
                    video.play();
                }
            } catch(e) {
                console.error(e);
                status.innerHTML = `<span style="color:red">Connection Failed</span>`;
            }
        }
    }

    function togglePiP() {
        if (document.pictureInPictureElement) document.exitPictureInPicture();
        else if (document.pictureInPictureEnabled && video.style.display !== 'none') video.requestPictureInPicture();
        else showToast("PiP not supported or Embed playing");
    }

    function toggleAspect() {
        if(video.style.objectFit === 'contain') { video.style.objectFit = 'cover'; showToast("Zoom Mode"); } 
        else { video.style.objectFit = 'contain'; showToast("Fit Mode"); }
    }

    function reportIssue() {
        if(currentChannelIdx === -1) return;
        const chName = channels[currentChannelIdx].name;
        const text = `Report: Channel ${chName} is not working.`;
        window.open(`https://t.me/share/url?url=${encodeURIComponent(text)}`, '_blank');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

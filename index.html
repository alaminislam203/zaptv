<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0c15">
<meta name="description" content="ToffeeTvLive - Premium Live TV Streaming">
<title>Toffee Tv Live Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="manifest" href="manifest.json">

<style>
    :root {
        --primary: #00d2ff;
        --bg: #0b0c15;
        --card-bg: #151621;
        --text: #e2e8f0;
        --red: #ef4444;
        --green: #2ecc71;
    }

    body { margin: 0; padding: 10px; background-color: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); -webkit-tap-highlight-color: transparent; }
    
    .app-container { max-width: 900px; margin: 0 auto; padding-bottom: 50px; }

    /* HEADER */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .logo { font-family: 'Oswald', sans-serif; font-size: 22px; background: linear-gradient(90deg, var(--primary), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .live-badge { font-size: 10px; background: var(--red); color: #fff; padding: 4px 8px; border-radius: 4px; font-weight: bold; animation: pulse 1.5s infinite; }

    /* PLAYER AREA */
    .player-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0, 210, 255, 0.15); margin-bottom: 10px; }
    video { width: 100%; height: 100%; object-fit: contain; }
    iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
    
    /* Player Controls Bar */
    .player-controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .ctrl-btn { flex: 1; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px; border-radius: 6px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
    .ctrl-btn:active { transform: scale(0.95); }
    .ctrl-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* INFO CARD */
    .info-card { background: var(--card-bg); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
    .info-header { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
    .ch-logo-lg { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); padding: 2px; object-fit: contain; background: #000; }
    .status-text { font-size: 11px; color: var(--green); margin-top: 2px; }
    
    .source-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .src-btn { background: rgba(255,255,255,0.08); border: none; color: #ccc; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
    .src-btn.active { background: var(--primary); color: #000; font-weight: bold; }

    /* CATEGORIES */
    .cat-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; scrollbar-width: none; }
    .cat-btn { white-space: nowrap; padding: 8px 16px; border-radius: 20px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: #ccc; font-size: 12px; cursor: pointer; transition: 0.3s; }
    .cat-btn.active { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 600; }

    /* GRID & CARDS */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
    .card { background: var(--card-bg); border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; position: relative; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
    .card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .card.active { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,210,255,0.2); }
    
    .card img { width: 40px; height: 40px; object-fit: contain; margin-bottom: 8px; }
    .card-title { font-size: 11px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    /* Favorite Heart */
    .fav-icon { position: absolute; top: 5px; right: 5px; font-size: 14px; color: rgba(255,255,255,0.2); z-index: 2; transition: 0.2s; }
    .fav-icon.is-fav { color: var(--red); transform: scale(1.2); }

    /* SEARCH */
    .search-box { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; margin-bottom: 15px; outline: none; }
    .search-box:focus { border-color: var(--primary); }

    /* ANIMATION */
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    
    /* Notification */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; bottom: 40px; }
</style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo"><i class="fas fa-play-circle"></i> ToffeePro</div>
        <div class="live-badge">● LIVE</div>
    </div>

    <div style="background: rgba(0,210,255,0.1); border-left: 3px solid var(--primary); padding: 8px; font-size: 12px; margin-bottom: 15px; border-radius: 4px;">
        <marquee>⚠️ চ্যানেল লোড হতে সমস্যা হলে 'Report' বাটনে ক্লিক করুন। নতুন নতুন চ্যানেল পেতে আমাদের টেলিগ্রামে যুক্ত হোন।</marquee>
    </div>

    <div class="player-wrapper">
        <video id="videoPlayer" controls autoplay playsinline poster="https://i.imgur.com/3Yp7XlS.png"></video>
        <iframe id="iframePlayer" style="display:none;" allowfullscreen allow="encrypted-media; autoplay"></iframe>
    </div>

    <div class="player-controls">
        <button class="ctrl-btn" onclick="togglePiP()"><i class="fas fa-compress-arrows-alt"></i> PiP Mode</button>
        <button class="ctrl-btn" onclick="toggleAspect()"><i class="fas fa-expand"></i> Zoom/Fit</button>
        <button class="ctrl-btn" onclick="toggleFavoriteCurrent()"><i class="fas fa-heart"></i> Favorite</button>
        <button class="ctrl-btn" onclick="reportIssue()" style="border-color: var(--red); color: var(--red);"><i class="fas fa-exclamation-triangle"></i> Report</button>
    </div>

    <div class="info-card">
        <div class="info-header">
            <img id="mainLogo" class="ch-logo-lg" src="https://via.placeholder.com/50">
            <div>
                <h3 id="mainTitle" style="margin:0; font-size:16px;">Select a Channel</h3>
                <div id="mainStatus" class="status-text">Ready to watch</div>
            </div>
        </div>
        <div id="sourceContainer" class="source-list"></div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 চ্যানেল খুঁজুন (e.g. Sports, Sony)...">

    <div class="cat-scroll" id="catContainer">
        <button class="cat-btn active" onclick="filterCat('all')">All</button>
        <button class="cat-btn" onclick="filterCat('fav')">❤️ Favorites</button>
        <button class="cat-btn" onclick="filterCat('Sports')">🏏 Sports</button>
        <button class="cat-btn" onclick="filterCat('Entertainment')">🎬 Entertainment</button>
        <button class="cat-btn" onclick="filterCat('News')">📰 News</button>
    </div>

    <div id="channelGrid" class="grid"></div>

    <div id="toast" class="toast">Action Successful</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mux.js/6.3.0/mux.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.compiled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

<script>
    // ================= DATA =================
    // category অবশ্যই থাকতে হবে: 'Sports', 'Entertainment', 'News'
    const channels = [
        {
            name: "T Sports HD",
            logo: "https://i.ibb.co/Dr3R4jc/tsports.png",
            category: "Sports",
            sources: [
                { label: "Server 1", url: "https://live-cdn.tsports.com/live-01/master.m3u8" } // Demo link
            ]
        },
        {
            name: "Ten Cricket",
            logo: "https://i.postimg.cc/fWV00yP8/20250529_123315.png",
            category: "Sports",
            sources: [
                { label: "Server 1", url: "https://bongoflixbd.top/?watch=212f6ccc690a978b72b758522a82d9b4", isEmbed: true }
            ]
        },
        {
            name: "Sony Ten 1",
            logo: "https://upload.wikimedia.org/wikipedia/commons/9/93/Sony_Sports_Ten_1_logo.png",
            category: "Sports",
            sources: [
                { label: "HD Link", url: "https://example.com/stream.m3u8" }
            ]
        },
        {
            name: "Somoy TV",
            logo: "https://upload.wikimedia.org/wikipedia/en/c/c2/Somoy_TV_Logo.jpg",
            category: "News",
            sources: [
                { label: "YouTube", url: "https://www.youtube.com/embed/P6p72v5Vz_k?autoplay=1", isEmbed: true }
            ]
        }
    ];

    // ================= STATE =================
    let currentCategory = 'all';
    let favorites = JSON.parse(localStorage.getItem('zapFavorites')) || [];
    let activePlayer = null; // 'shaka', 'hls'
    let shakaInstance = null;
    let hlsInstance = null;
    let currentChannelIdx = -1;

    // ================= DOM ELEMENTS =================
    const video = document.getElementById('videoPlayer');
    const iframe = document.getElementById('iframePlayer');
    const grid = document.getElementById('channelGrid');
    const search = document.getElementById('searchInput');
    const title = document.getElementById('mainTitle');
    const logo = document.getElementById('mainLogo');
    const status = document.getElementById('mainStatus');
    const srcContainer = document.getElementById('sourceContainer');

    // ================= INIT =================
    function init() {
        shaka.polyfill.installAll();
        if(shaka.Player.isBrowserSupported()) {
            shakaInstance = new shaka.Player(video);
        }
        renderChannels();
        
        // Search Listener
        search.addEventListener('input', (e) => {
            renderChannels(e.target.value);
        });
    }

    // ================= RENDER LOGIC =================
    function renderChannels(query = "") {
        grid.innerHTML = "";
        
        const filtered = channels.filter((ch, idx) => {
            // Category Filter
            let catMatch = false;
            if (currentCategory === 'all') catMatch = true;
            else if (currentCategory === 'fav') catMatch = favorites.includes(idx);
            else catMatch = ch.category === currentCategory;

            // Search Filter
            let searchMatch = ch.name.toLowerCase().includes(query.toLowerCase());

            return catMatch && searchMatch;
        });

        if(filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:20px;color:#666;">No channels found</div>`;
            return;
        }

        filtered.forEach(ch => {
            // Find original index for favorite logic
            const originalIdx = channels.indexOf(ch);
            const isFav = favorites.includes(originalIdx);

            const div = document.createElement('div');
            div.className = `card ${currentChannelIdx === originalIdx ? 'active' : ''}`;
            div.onclick = (e) => {
                if(!e.target.classList.contains('fav-icon')) {
                    loadChannel(originalIdx);
                }
            };

            div.innerHTML = `
                <i class="fas fa-heart fav-icon ${isFav ? 'is-fav' : ''}" onclick="toggleFav(${originalIdx}, this)"></i>
                <img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/40'">
                <div class="card-title">${ch.name}</div>
            `;
            grid.appendChild(div);
        });
    }

    function filterCat(cat) {
        currentCategory = cat;
        // Update Buttons UI
        document.querySelectorAll('.cat-btn').forEach(btn => {
            if(btn.innerText.toLowerCase().includes(cat.toLowerCase()) || (cat === 'all' && btn.innerText === 'All')) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        renderChannels(search.value);
    }

    // ================= FAVORITES =================
    function toggleFav(idx, iconElem) {
        if (favorites.includes(idx)) {
            favorites = favorites.filter(id => id !== idx);
            if(iconElem) iconElem.classList.remove('is-fav');
            showToast("Removed from Favorites");
        } else {
            favorites.push(idx);
            if(iconElem) iconElem.classList.add('is-fav');
            showToast("Added to Favorites ❤️");
        }
        localStorage.setItem('zapFavorites', JSON.stringify(favorites));
        
        // If currently on Fav tab, refresh
        if(currentCategory === 'fav') renderChannels();
    }

    function toggleFavoriteCurrent() {
        if(currentChannelIdx !== -1) {
            toggleFav(currentChannelIdx, null);
            renderChannels(); // Refresh icons
        } else {
            showToast("Select a channel first");
        }
    }

    // ================= PLAYBACK LOGIC =================
    function loadChannel(idx) {
        currentChannelIdx = idx;
        const ch = channels[idx];
        
        // UI Update
        title.innerText = ch.name;
        logo.src = ch.logo;
        status.innerHTML = `<span style="color:#00d2ff">Connecting...</span>`;
        srcContainer.innerHTML = "";
        renderChannels(search.value); // to highlight active card
        
        // Generate Source Buttons
        ch.sources.forEach((src, i) => {
            const btn = document.createElement('button');
            btn.className = `src-btn ${i===0?'active':''}`;
            btn.innerText = src.label;
            btn.onclick = () => playSource(src, btn);
            srcContainer.appendChild(btn);
            if(i === 0) playSource(src, btn);
        });
        
        // Scroll to player on mobile
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function playSource(src, btnElem) {
        // UI
        document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
        if(btnElem) btnElem.classList.add('active');

        const url = src.url;
        const isEmbed = src.isEmbed;
        const isMpd = url.includes('.mpd');
        const isHls = url.includes('.m3u8');

        // Cleanup
        if(hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if(activePlayer === 'shaka') { await shakaInstance.unload(); }
        
        if (isEmbed) {
            video.style.display = 'none';
            video.pause();
            iframe.style.display = 'block';
            iframe.src = url;
            status.innerHTML = `<span style="color:orange">Playing Embed</span>`;
        } else {
            iframe.style.display = 'none';
            iframe.src = "";
            video.style.display = 'block';
            
            try {
                if (isMpd) {
                    activePlayer = 'shaka';
                    shakaInstance.configure({ drm: { clearKeys: src.drm || {} } });
                    await shakaInstance.load(url);
                    status.innerHTML = `<span style="color:#2ecc71">Playing Live (DRM)</span>`;
                } else if (isHls) {
                    if(Hls.isSupported()) {
                        const config = {};
                        if(src.headers) {
                             config.xhrSetup = (xhr) => {
                                for(let key in src.headers) xhr.setRequestHeader(key, src.headers[key]);
                             }
                        }
                        hlsInstance = new Hls(config);
                        hlsInstance.loadSource(url);
                        hlsInstance.attachMedia(video);
                        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                            video.play();
                            status.innerHTML = `<span style="color:#2ecc71">Playing Live (HLS)</span>`;
                        });
                        hlsInstance.on(Hls.Events.ERROR, (e, data) => {
                           if(data.fatal) status.innerHTML = `<span style="color:red">Stream Error</span>`;
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                        video.play();
                    }
                } else {
                    video.src = url;
                    video.play();
                }
            } catch(e) {
                console.error(e);
                status.innerHTML = `<span style="color:red">Connection Failed</span>`;
            }
        }
    }

    // ================= ADVANCED CONTROLS =================
    function togglePiP() {
        if (document.pictureInPictureElement) {
            document.exitPictureInPicture();
        } else if (document.pictureInPictureEnabled && video.style.display !== 'none') {
            video.requestPictureInPicture();
        } else {
            showToast("PiP not supported or Embed playing");
        }
    }

    function toggleAspect() {
        if(video.style.objectFit === 'contain') {
            video.style.objectFit = 'cover';
            showToast("Zoom Mode");
        } else {
            video.style.objectFit = 'contain';
            showToast("Fit Mode");
        }
    }

    function reportIssue() {
        if(currentChannelIdx === -1) return;
        const chName = channels[currentChannelIdx].name;
        // টেলিগ্রাম লিংক আপনার ইউজারনেম দিয়ে পাল্টে নিন
        const text = `Report: Channel ${chName} is not working.`;
        window.open(`https://t.me/share/url?url=${encodeURIComponent(text)}`, '_blank');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

<script>
(function() {
    const warningText = "আপনার ব্রাউজারে অ্যাড ব্লকার চালু আছে! আমাদের সাইটটি ফ্রি রাখতে অনুগ্রহ করে এটি বন্ধ করুন।";
    const modalID = 'ab-warning-modal';
    function showModal() {
        if (document.getElementById(modalID)) return;
        const modal = document.createElement('div');
        modal.id = modalID;
        modal.style.cssText = `position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999999; display: flex; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(5px);`;
        modal.innerHTML = `<div style="background:#1a1a1a; color:#fff; padding:30px; border-radius:12px; text-align:center; max-width:90%; width:400px; border: 1px solid #333; box-shadow: 0 0 25px rgba(255,0,0,0.2);"><div style="font-size: 50px; margin-bottom: 10px;">🛡️</div><h2 style="color:#ef4444; margin:0 0 10px 0; font-family: sans-serif;">Adblock Detected</h2><p style="font-size:15px; color:#cbd5e1; line-height: 1.5; margin-bottom: 20px;">${warningText}</p><button onclick="location.reload()" style="background:#ef4444; color:white; border:none; padding:12px 25px; border-radius:6px; font-weight:bold; cursor:pointer; font-size:14px; transition: 0.2s;">রিফ্রেশ করুন</button></div>`;
        document.body.appendChild(modal);
        document.body.style.overflow = 'hidden';
    }
    async function detectAdBlock() {
        let adBlockEnabled = false;
        try { await fetch(new Request("https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js", { method: 'HEAD', mode: 'no-cors' })); } catch (e) { adBlockEnabled = true; }
        if (!adBlockEnabled) {
            const bait = document.createElement('div');
            bait.innerHTML = '&nbsp;';
            bait.className = 'adsbox ad-banner adsbygoogle pub_300x250';
            bait.style.cssText = 'position:absolute; top:-1000px; left:-1000px; width:1px; height:1px;';
            document.body.appendChild(bait);
            await new Promise(r => setTimeout(r, 100));
            if (window.document.body.getAttribute('abp') !== null || bait.offsetParent === null || bait.offsetHeight === 0 || bait.offsetLeft === 0 || window.getComputedStyle(bait).getPropertyValue('display') === 'none' || window.getComputedStyle(bait).getPropertyValue('visibility') === 'hidden') { adBlockEnabled = true; }
            try { bait.remove(); } catch(e){}
        }
        if (adBlockEnabled) { showModal(); }
    }
    window.addEventListener('load', () => { setTimeout(detectAdBlock, 1000); });
})();
</script>

    /* CONTROLS */
    .player-controls { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }

    .hot-scroll {

    .match-card { min-width: 140px; background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.5)); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; cursor: pointer; position: relative; pointer-events: none; /* চাইল্ড এলিমেন্ট ক্লিকের সমস্যা রোধে */ }
    .match-card > * { pointer-events: none; } /* কার্ডের ভেতরের লেখায় ক্লিক পড়বে না */
    
    /* শুধুমাত্র কার্ডে ক্লিক ইভেন্ট সচল রাখার জন্য JS এ হ্যান্ডেল করা হবে */

    .match-time { position: absolute; top: 5px; right: 5px; font-size: 9px; font-weight: bold; background: rgba(0,0,0,0.6); color: #fff; padding: 2px 5px; border-radius: 4px; transition: 0.3s; }

    /* SEARCH */
    .search-box { width: 100%; padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; margin-bottom: 10px; outline: none; font-size: 14px; }
    .search-box:focus { border-color: var(--primary); }

    /* GRID */
    .grid-container { max-height: 450px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 5px; border: 1px solid rgba(255,255,255,0.05); -webkit-overflow-scrolling: touch; }
    .grid-container::-webkit-scrollbar { width: 5px; }
    .grid-container::-webkit-scrollbar-track { background: transparent; }
    .grid-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
    .card { background: var(--card-bg); border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; position: relative; border: 1px solid rgba(255,255,255,0.05); content-visibility: auto; contain-intrinsic-size: 80px; }
    .card:hover { border-color: var(--primary); }
    .card.active { border-color: var(--primary); background: rgba(0, 210, 255, 0.05); }
    .card img { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; }
    .card-title { font-size: 10px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fav-icon { position: absolute; top: 5px; right: 5px; font-size: 12px; color: rgba(255,255,255,0.2); z-index: 2; }
    .fav-icon.is-fav { color: var(--red); }

    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 11px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; bottom: 40px; }
</style>

<script>
    // ================= DATA =================
    const hotMatches = [
        { 
            team1: "Bangladesh", team2: "India", 
            info: "1st ODI", 
            matchTime: "2025-12-09T20:00:00", 
            channelName: "T Sports HD" 
        },
        { 
            team1: "Real Madrid", team2: "Barca", 
            info: "La Liga", 
            matchTime: "2025-12-10T02:00:00", 
            channelName: "Sony Ten 1" 
        }
    ];

    const channels = [
        {
            name: "T Sports HD",
            logo: "https://i.ibb.co/Dr3R4jc/tsports.png",
            sources: [ { label: "Server 1", url: "https://live-cdn.tsports.com/live-01/master.m3u8" } ]
        },
        {
            name: "Ten Cricket",
            logo: "https://i.postimg.cc/fWV00yP8/20250529_123315.png",
            sources: [ { label: "Server 1", url: "https://bongoflixbd.top/?watch=212f6ccc690a978b72b758522a82d9b4", isEmbed: true } ]
        },
        {
            name: "Sony Ten 1",
            logo: "https://upload.wikimedia.org/wikipedia/commons/9/93/Sony_Sports_Ten_1_logo.png",
            sources: [ { label: "HD Link", url: "https://example.com/stream.m3u8" } ]
        },
        {
            name: "Somoy TV",
            logo: "https://upload.wikimedia.org/wikipedia/en/c/c2/Somoy_TV_Logo.jpg",
            sources: [ { label: "YouTube", url: "https://www.youtube.com/embed/P6p72v5Vz_k?autoplay=1", isEmbed: true } ]
        }
    ];

    // ================= STATE =================
    let favorites = JSON.parse(localStorage.getItem('zapFavorites')) || [];
    let activePlayer = null; 
    let shakaInstance = null;
    let hlsInstance = null;
    let currentChannelIdx = -1;
    let timerInterval = null;

    // ================= DOM =================
    const video = document.getElementById('videoPlayer');
    const iframe = document.getElementById('iframePlayer');
    const grid = document.getElementById('channelGrid');
    const search = document.getElementById('searchInput');
    const title = document.getElementById('mainTitle');
    const logo = document.getElementById('mainLogo');
    const status = document.getElementById('mainStatus');
    const srcContainer = document.getElementById('sourceContainer');
    const hotMatchContainer = document.getElementById('hotMatchesContainer');

    // ================= INIT =================
    function init() {
        shaka.polyfill.installAll();
        if(shaka.Player.isBrowserSupported()) {
            shakaInstance = new shaka.Player(video);
        }
        renderHotMatches();
        renderChannels(); 
        startCountdown();
        
        let timeout = null;
        search.addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => { renderChannels(e.target.value); }, 300);
        });

        // Initialize Drag Scroll
        initDragScroll();
    }

    // ================= HOT MATCH RENDER & DRAG =================
    function renderHotMatches() {
        hotMatchContainer.innerHTML = "";
        const fragment = document.createDocumentFragment();
        hotMatches.forEach(match => {
            const div = document.createElement('div');
            div.className = 'match-card';
            div.innerHTML = `
                <div class="match-time" data-time="${match.matchTime}">...</div>
                <div class="match-teams">${match.team1} <br> <span style="color:#999;font-weight:normal">vs</span> <br> ${match.team2}</div>
                <div style="font-size:10px; color:#aaa; margin-top:5px;">${match.info}</div>
            `;
            // Click Handler via JS to prevent drag conflict
            div.addEventListener('click', (e) => {
                // If dragged, don't trigger click
                if(hotMatchContainer.classList.contains('dragging')) return;
                
                const targetIdx = channels.findIndex(ch => ch.name === match.channelName);
                if(targetIdx !== -1) loadChannel(targetIdx);
                else showToast("Channel not found!");
            });
            fragment.appendChild(div);
        });
        hotMatchContainer.appendChild(fragment);
    }

    // 🖱️ DRAG TO SCROLL LOGIC FOR PC
    function initDragScroll() {
        const slider = document.getElementById('hotMatchesContainer');
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            slider.classList.add('active');
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });

        slider.addEventListener('mouseleave', () => {
            isDown = false;
            slider.classList.remove('active');
            setTimeout(() => slider.classList.remove('dragging'), 50);
        });

        slider.addEventListener('mouseup', () => {
            isDown = false;
            slider.classList.remove('active');
            setTimeout(() => slider.classList.remove('dragging'), 50);
        });

        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2; // Scroll speed
            slider.scrollLeft = scrollLeft - walk;
            
            // Mark as dragging to prevent click event
            if(Math.abs(walk) > 5) slider.classList.add('dragging');
        });
    }

    // ================= TIMER LOGIC =================
    function startCountdown() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const timeBadges = document.querySelectorAll('.match-time');
            const now = new Date().getTime();
            timeBadges.forEach(badge => {
                const targetTime = new Date(badge.dataset.time).getTime();
                const diff = targetTime - now;
                if (diff > 0) {
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    badge.innerText = `${hours}h ${minutes}m ${seconds}s`;
                    badge.classList.remove('is-live');
                } else {
                    badge.innerText = "LIVE";
                    badge.classList.add('is-live');
                }
            });
        }, 1000);
    }

    // ================= CHANNEL RENDER =================
    function renderChannels(query = "") {
        grid.innerHTML = "";
        const filtered = channels.filter(ch => ch.name.toLowerCase().includes(query.toLowerCase()));
        
        if(filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:20px;color:#666;">No channels found</div>`;
            return;
        }

        const fragment = document.createDocumentFragment();
        filtered.forEach(ch => {
            const originalIdx = channels.indexOf(ch);
            const isFav = favorites.includes(originalIdx);

            const div = document.createElement('div');
            div.className = `card ${currentChannelIdx === originalIdx ? 'active' : ''}`;
            div.onclick = (e) => {
                if(!e.target.classList.contains('fav-icon')) loadChannel(originalIdx);
            };

            div.innerHTML = `
                <i class="fas fa-heart fav-icon ${isFav ? 'is-fav' : ''}" onclick="toggleFav(${originalIdx}, this)"></i>
                <img src="${ch.logo}" loading="lazy" decoding="async" onerror="this.src='https://via.placeholder.com/40'">
                <div class="card-title">${ch.name}</div>
            `;
            fragment.appendChild(div);
        });
        grid.appendChild(fragment);
    }

    // ================= CORE FUNCTIONS (FAV, PLAY, ETC) =================
    function toggleFav(idx, iconElem) {
        if (favorites.includes(idx)) {
            favorites = favorites.filter(id => id !== idx);
            if(iconElem) iconElem.classList.remove('is-fav');
            showToast("Removed from Favorites");
        } else {
            favorites.push(idx);
            if(iconElem) iconElem.classList.add('is-fav');
            showToast("Added to Favorites ❤️");
        }
        localStorage.setItem('zapFavorites', JSON.stringify(favorites));
    }

    function toggleFavoriteCurrent() {
        if(currentChannelIdx !== -1) {
            toggleFav(currentChannelIdx, null);
            renderChannels(search.value);
        } else {
            showToast("Select a channel first");
        }
    }

    function loadChannel(idx) {
        currentChannelIdx = idx;
        const ch = channels[idx];
        title.innerText = ch.name;
        logo.src = ch.logo;
        status.innerHTML = `<span style="color:#00d2ff">Connecting...</span>`;
        srcContainer.innerHTML = "";
        renderChannels(search.value); 
        
        ch.sources.forEach((src, i) => {
            const btn = document.createElement('button');
            btn.className = `src-btn ${i===0?'active':''}`;
            btn.innerText = src.label;
            btn.onclick = () => playSource(src, btn);
            srcContainer.appendChild(btn);
            if(i === 0) playSource(src, btn);
        });
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function playSource(src, btnElem) {
        document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
        if(btnElem) btnElem.classList.add('active');
        const url = src.url;
        const isEmbed = src.isEmbed;
        const isMpd = url.includes('.mpd');
        const isHls = url.includes('.m3u8');

        if(hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        if(activePlayer === 'shaka') { await shakaInstance.unload(); }
        
        if (isEmbed) {
            video.style.display = 'none';
            video.pause();
            iframe.style.display = 'block';
            iframe.src = url;
            status.innerHTML = `<span style="color:orange">Playing Embed</span>`;
        } else {
            iframe.style.display = 'none';
            iframe.src = "";
            video.style.display = 'block';
            try {
                if (isMpd) {
                    activePlayer = 'shaka';
                    shakaInstance.configure({ drm: { clearKeys: src.drm || {} } });
                    await shakaInstance.load(url);
                    status.innerHTML = `<span style="color:#2ecc71">Playing Live (DRM)</span>`;
                } else if (isHls) {
                    if(Hls.isSupported()) {
                        const config = {};
                        if(src.headers) {
                             config.xhrSetup = (xhr) => { for(let key in src.headers) xhr.setRequestHeader(key, src.headers[key]); }
                        }
                        hlsInstance = new Hls(config);
                        hlsInstance.loadSource(url);
                        hlsInstance.attachMedia(video);
                        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                            video.play();
                            status.innerHTML = `<span style="color:#2ecc71">Playing Live (HLS)</span>`;
                        });
                        hlsInstance.on(Hls.Events.ERROR, (e, data) => { if(data.fatal) status.innerHTML = `<span style="color:red">Stream Error</span>`; });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                        video.play();
                    }
                } else {
                    video.src = url;
                    video.play();
                }
            } catch(e) {
                console.error(e);
                status.innerHTML = `<span style="color:red">Connection Failed</span>`;
            }
        }
    }

    function togglePiP() {
        if (document.pictureInPictureElement) document.exitPictureInPicture();
        else if (document.pictureInPictureEnabled && video.style.display !== 'none') video.requestPictureInPicture();
        else showToast("PiP not supported or Embed playing");
    }

    function toggleAspect() {
        if(video.style.objectFit === 'contain') { video.style.objectFit = 'cover'; showToast("Zoom Mode"); } 
        else { video.style.objectFit = 'contain'; showToast("Fit Mode"); }
    }

    function reportIssue() {
        if(currentChannelIdx === -1) return;
        const chName = channels[currentChannelIdx].name;
        const text = `Report: Channel ${chName} is not working.`;
        window.open(`https://t.me/share/url?url=${encodeURIComponent(text)}`, '_blank');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
